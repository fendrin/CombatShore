[unit_type]
    
    name= _ "Citadelle"
    id=1235
    [base_unit]
        id=337
    [/base_unit]
    hide_help=no
    do_not_list=no


    description= _ "Fahrender Bunker"

    image=units/mk4/stationary/mk4v_citadelle.png
    #    InfoImage = mk4v_citadelle.jpg
    #    WreckageObject = 14235

    add_to_hitpoints=+200
    add_to_vision=+10

    #    Features += moveduringreactionfire satelliteview

    [cargo_bay]
        #    Transportation { 
        slots=4 # MaxLoadableUnits = 4
        max_weight=20 # MaxLoadableUnitSize = 10
        max_total_weight=40 # MaxLoadableMass = 40
        # CategoriesNOT -> VehicleType.cargo_trooper_only.CategoriesNOT
        # EntranceSystemNum = 1
        {GR_IO} # EntranceSystem0 ->* VehicleType.GrIO
        [+entrance]
            [filter_cargo]
                [not]
                    {CARGO_TROOPER_ONLY}
                [/not]
            [/filter_cargo]
        [/entrance]
    [/cargo_bay]

    # Weapons 
    # Initiative = 0
    # Number = 5
    {ARTILLERY} # Weapon0 ->* VehicleType.Artillery 
    [+attack]
        #       Weapon0.MaxRange = 50
        #       Weapon0.MinRange = 20
        ammo=15
        #       Weapon0.Punch@MaxRange = 80
        #       Weapon0.Punch@MinRange = 105
        damage=105
        #       Weapon0.ReactionFireShots = 1        
    [/attack]

    {TANK_GUN} # Weapon1 ->* VehicleType.Tank_Gun 
    [+attack]
        #       Weapon1.MaxRange = 20
        ammo=12
        #       Weapon1.Punch@MaxRange = 65
        #       Weapon1.Punch@MinRange = 75
        damage=75
    [/attack]

    {SAMH} # Weapon2 ->* VehicleType.SAMH 
    [+attack]
        #       Weapon2.MaxRange = 50
        ammo=8
        #       Weapon2.ReactionFireShots = 1        
    [/attack]

    {SHIP_MG} # Weapon3 ->* VehicleType.Ship_MG
    [+attack]
        #       Weapon3.Type = machinegun ammo_transfer shootable 
        ammo=20
        #       Weapon3.ReactionFireShots = 0        
    [/attack]

    {SOM} # Weapon4 ->* VehicleType.SOM 
    [+attack]
        ammo=2        
    [/attack]

[/unit_type]

# Infotext = [Die Einheiten der Cita-Reihe sind eine Spezialitšt der Cromonischen Streitkršfte. Es handelt sich dabei um fahrende Bunkerstellungen. Entsprechend stark ist die Panzerung. Es handelt sich um eine sogenannte kombinierte Panzerung, die speziell gegen Antitankgeschosse entwickelt worden ist. Sie besteht aus mehreren Schichten, die solchen Geschossen viel von ihrer Wirkung nehmen und ist darŁberhinaus von einer solchen Stšrke, daŖ sie normalen GefechtsbeschuŖ ohne Probleme abwehrt. Problematisch ist allerdings, daŖ die Citas aufgrund der GrŲŖe trotzdem prinzipiell ein gutes Ziel fŁr schwere Waffen darstellen. Auch die Geschwindigkeit ist durch das riesige Gewicht sehr gering. Das grŲŖte Problem bei den mobilen Bunkern stellt deshalb der schnelle Transport dar. HierfŁr kommt nur eine spezielle Landeinheit infrage, der Dolter. Er kann diese Einheiten optimal verschieben. Wichtig fŁr einen effizienten Einsatz der Bunker ist deshalb, so unwahrscheinlich es auch klingt, ein gut ausgebautes Schienennetz.
# Die Citadelle ist die Standardeinheit dieser Einheitenreihe. Sie ist mit einer vollstšndigen Kommunikationszentrale ausgestattet und wird daher gern als fahrende Kommandoeinheit verwendet. Dabei besitzt sie eine fŁr Panzerfahrzeuge sehr gute Aufklšrungsreichweite und kann auch den Orbit nach Satelliten scannen. BestŁckt ist sie mit einer mittleren 110mm Artilleriekanone in einem flachen, drehbaren Turm, welche fŁr dieses Kaliber Łber eine recht groŖe Reichweite verfŁgt. Diese kann aber nicht gegen direkt angreifende Gegner eingesetzt werden. HierfŁr ist eine 80mm Panzerabwehrkanone eingebaut. Gegen anrŁckende Infanterie sind mehrere Maschinenkanonen montiert. Zur Bekšmpfung von Flugzeugen in allen Luftschichten dienen Luftabwehrraketen mit Wšrmesensoren. Als eine von wenigen Landeinheiten ist es ihr weiterhin mŲglich, Orbitaleinheiten mit den mitgefŁhrten schweren AO-Raketen zu bekšmpfen. In Ihren Lagerršumen kŲnnen bis zu 4 Golems oder andere leichte Einheiten mitgefŁhrt werden und so das Angriffs- und Verteidigungspotential dieser Einheit deutlich erhŲhen. Aufgrund dieser nahezu kompletten Ausstattung ist die Citadelle der Allrounder unter den mobilen Bunkern und, im Verband richtig eingesetzt, kaum zu zerstŲren. ]
