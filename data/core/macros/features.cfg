 
#define FEATURE_SELF_REPAIR VALUE
    # Canned definition of the Self Repair feature to be included in an [abilities]
    # clause.
    [regenerate]
        value={VALUE}
        id=self_repair
        name= _ "Self Repair"
        #female_name= _ "female^regenerates"
        description= _ "The unit is able to repair itself."
        affect_self=yes
        #poison=cured

        #TODO disable if unit runs out of fuel

    [/regenerate]
#enddef

#define WREAKAGE_OBJECT UNIT_ID IMAGE_PATH
   [event]
        id=wreckageobject_{UNIT_ID}
        name=die
        first_time_only=no
        [filter]
            type={UNIT_ID}
        [/filter]
        [item]
            image={IMAGE_PATH}
            x=$x1
            y=$y1
        [/item]
    [/event]
#enddef

#define ASCEND 
    [event]
        id=ascend_airplane
        name=start
        [set_menu_item]
            id=ascend_airplane_
            description= _ "Ascend Airplane"
            image=actions/ascend-airplane.png

            #[filter_location]
                
            #[/filter_location]

            [show_if]
                [have_unit]
                    x=$x1
                    y=$y1
                [/have_unit]
            [/show_if]

            [command]
                [object]
                    silent=yes
                    [filter]
                        x=$x1
                        y=$y1
                    [/filter]
                    
                    [effect]
                        apply_to=variation
                        name=low_level_flight
                    [/effect]
                [/object]
            [/command]            
        [/set_menu_item]
        [set_menu_item]
            id=descend_airplane
            description= _ "Descend Airplane"
            image=actions/descend-airplane.png

            #[filter_location]
                
            #[/filter_location]

            [show_if]
                [have_unit]
                    x=$x1
                    y=$y1
                [/have_unit]
            [/show_if]

            [command]
                [object]
                    silent=yes
                    [filter]
                        x=$x1
                        y=$y1
                    [/filter]
                    
                    [effect]
                        apply_to=variation
                        name=ground_level
                    [/effect]
                [/object]
            [/command]            
        [/set_menu_item]

    [/event]
#enddef
