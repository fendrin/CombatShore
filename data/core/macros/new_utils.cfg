#define ANIM_STAND IMAGE SOUND X_OFF Y_OFF OPAQUE SCALE
    [standing_anim]
        start_time=0
        halo_start_time=0
        halo_layer=1
        layer=2

        [if]
            direction=n 
            [halo_frame]
                duration=150
                image={IMAGE}~CS(-255,-255,-255)~SCALE({SCALE})~O({OPAQUE}%)
                #halo_x=10
                #halo_y=20
                x={X_OFF}
                y={Y_OFF}
                auto_hflip=no
                auto_vflip=no
                #offset=0.0~1.0                
            [/halo_frame]
            [frame]
                duration=150
                image={IMAGE}
                sound={SOUND}
                auto_hflip=no
                auto_vflip=no
                #offset=0.0~1.0                
            [/frame]
        [/if]
        [else]
            direction=s 
            [halo_frame]
                duration=150
                image={IMAGE}~CS(-255,-255,-255)~SCALE({SCALE})~O({OPAQUE}%)~ROTATE(180)
                #halo_x=10
                #halo_y=20
                x={X_OFF}
                y={Y_OFF}
                auto_hflip=no
                auto_vflip=no
                #offset=0.0~1.0                
            [/halo_frame]
            [frame]
                duration=150
                image={IMAGE}~ROTATE(180)
                sound={SOUND}
                auto_hflip=no
                auto_vflip=no
            [/frame]
        [/else]
        [else]
            direction=ne
            [halo_frame]
                duration=150
                image={IMAGE}~CS(-255,-255,-255)~SCALE({SCALE})~O({OPAQUE}%)~ROTATE(60)
                #halo_x=10
                #halo_y=20
                x={X_OFF}
                y={Y_OFF}
                auto_hflip=no
                auto_vflip=no
                #offset=0.0~1.0                
            [/halo_frame]

            [frame]
                duration=150
                image={IMAGE}~ROTATE(60)
                sound={SOUND}
                auto_hflip=no
                auto_vflip=no
            [/frame]
        [/else]
        [else]
            direction=se
            [halo_frame]
                duration=150
                image={IMAGE}~CS(-255,-255,-255)~SCALE({SCALE})~O({OPAQUE}%)~ROTATE(120)
                #halo_x=10
                #halo_y=20
                x={X_OFF}
                y={Y_OFF}
                auto_hflip=no
                auto_vflip=no
                #offset=0.0~1.0                
            [/halo_frame]

            [frame]
                duration=150
                image={IMAGE}~ROTATE(120)
                sound={SOUND}
                auto_hflip=no
                auto_vflip=no
            [/frame]
        [/else]
        [else]
            direction=nw
            [halo_frame]
                duration=150
                image={IMAGE}~CS(-255,-255,-255)~SCALE({SCALE})~O({OPAQUE}%)~ROTATE(300)
                #halo_x=10
                #halo_y=20
                x={X_OFF}
                y={Y_OFF}
                auto_hflip=no
                auto_vflip=no
                #offset=0.0~1.0                
            [/halo_frame]

            [frame]
                duration=150
                image={IMAGE}~ROTATE(300)
                sound={SOUND}
                auto_hflip=no
                auto_vflip=no
            [/frame]
        [/else]
        [else]
            direction=sw
            [halo_frame]
                duration=150
                image={IMAGE}~CS(-255,-255,-255)~SCALE({SCALE})~O({OPAQUE}%)~ROTATE(240)
                #halo_x=10
                #halo_y=20
                x={X_OFF}
                y={Y_OFF}
                auto_hflip=no
                auto_vflip=no
                #offset=0.0~1.0                
            [/halo_frame]

            [frame]
                duration=150
                image={IMAGE}~ROTATE(240)
                sound={SOUND}
                auto_hflip=no
                auto_vflip=no
            [/frame]
        [/else]
    [/standing_anim]
#enddef

