#define ANIM IMAGE SOUND
        start_time=0
        [if]
            direction=n #s,se,sw
            [frame]
                duration=150
                image={IMAGE}
                sound={SOUND}
                auto_hflip=no
                auto_vflip=no
            [/frame]
        [/if]
        [else]
            direction=s # n,ne,nw
            [frame]
                duration=150
                image={IMAGE}~ROTATE(180)
                sound={SOUND}
                auto_hflip=no
                auto_vflip=no
            [/frame]
        [/else]
        [else]
            direction=ne
            [frame]
                duration=150
                image={IMAGE}~ROTATE(60)
                sound={SOUND}
                auto_hflip=no
                auto_vflip=no
            [/frame]
        [/else]
        [else]
             direction=se
             [frame]
                 duration=150
                 image={IMAGE}~ROTATE(120)
                 sound={SOUND}
                 auto_hflip=no
                 auto_vflip=no
             [/frame]
        [/else]
        [else]
             direction=nw
             [frame]
                 duration=150
                 image={IMAGE}~ROTATE(300)
                 sound={SOUND}
                 auto_hflip=no
                 auto_vflip=no
            [/frame]
         [/else]
         [else]
             direction=sw
             [frame]
                 duration=150
                 image={IMAGE}~ROTATE(240)
                 sound={SOUND}
                 auto_hflip=no
                 auto_vflip=no
            [/frame]
        [/else]
        {DEFENSE_ANIM_RANGE IMAGE IMAGE SOUND ""}
#enddef

