#define FUEL_EVENT
    [event]
        name=moveto
        id=fuel_consumption

        first_time_only=no

        [allow_undo]
            #TODO add the stuff again.
        [/allow_undo]

        #[lua]
        #    code= << wesnoth.message("lua geht") >>
        #[/lua]

        [lua]
            code= << 
            local event_data  = wesnoth.current.event_context

            local unit = wesnoth.copy_unit(wesnoth.get_unit(event_data.x1, event_data.y1))
            unit.x = event_data.x2
            unit.y = event_data.y2
            wesnoth.put_unit(unit)

            local path, costs = wesnoth.find_path(event_data.x2, event_data.y2, event_data.x1, event_data.y1)

            wesnoth.extract_unit(wesnoth.get_unit(event_data.x2, event_data.y2))            

            --local fuel = unit.__cfg.fuel

            unit = wesnoth.get_unit(event_data.x1, event_data.y1)

            unit.variables.fuel = unit.variables.fuel - 15

            wesnoth.put_unit(unit)

            local fuel = unit.variables.fuel

            wesnoth.message(fuel) 

            >>
        [/lua]


        # [message]
        #     speaker=narrator
        #     message= "Es wurden $fields_moved felder blah"
        # [/message]



    [/event]
#enddef
