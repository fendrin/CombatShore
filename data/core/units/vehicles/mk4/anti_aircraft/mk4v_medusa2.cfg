# Infotext = [Die Medusa 2 entstand aus dem Gedanken heraus, die Schlagkraft eines Fla-Rak-System mit der hohen Mobilitšt leichter Flugabwehrpanzer zu kombinieren. Der Einfachheit halber versuchte man daher, den Doppelraketenwerfer der herkŲmmlichen Medusa auf die Wanne eines Fla-Panzers vom Typ Comet zu montieren. Der Grundgedanke war zwar gut, doch leider zeigte sich bereits bei den ersten Feldtests, dass die Konstrukteure sich die Sache etwas zu einfach vorgestellt hatten: durch die Masse der Medusa geriet der Schwerpunkt des gesamten Systems vŲllig aus der Waage, was bei den Testversuchen vor allem in schwierigem Gelšnde zu mehreren fatalen Unfšllen fŁhrte. AuŖerdem kam es durch die Schwerpunktšnderungen beim Start der Boden-Luft-Raketen dazu, dass die gesamte Einheit aus ihrer Position geworfen wurde und die Raketen in die vollkommen falsche Richtung starteten. Dies wiederum machte aufwšndige Korrekturen am Kurs der Raketen wšhrend des Zielanfluges notwendig und die Trefferquote ging rapide in den Keller.
# Umfangreiche Modifikationen an der Wanne und dem Waffensystem waren nŲtig, ehe die Konstruktion einen brauchbaren Zustand erreicht hatte. Dieser konnte sich dann jedoch durchaus sehen lassen! Durch die ńnderungen am Raketenwerfer und den Einsatz leichterer Raketen waren Durchschlagskraft und Reichweite im Vergleich zur herkŲmmlichen Medusa zwar zum Teil recht deutlich abgesunken, jedoch kann man mit der Medusa 2 noch immer Flugzeuge bekšmpfen, die sich in den obersten Luftschichten herumtreiben und die beispielsweise fŁr den Comet auch weiterhin unerreichbar bleiben. Im Gegensatz zu diesem ist zwar wiederum die HŲchstgeschwindigkeit deutlich herabgesetzt worden - trotz allem erreicht man auf StraŖen mit der Medusa 2 fast die dreifache Geschwindigkeit im Vergleich zum ursprŁnglichen Modell. Im Gelšnde ist der Geschwindigkeitsvorteil sogar noch weitaus deutlicher zu sehen.
# Die im Vergleich zum Comet verringerte Geschwindigkeit resultiert aus dem etwas hŲheren Gewicht der Medusa 2, sowie der etwas stšrkeren Panzerung. Um jedoch auch das leistungsfšhige MdRF-Geršt der normalen Medusa uneingeschršnkt Łbernehmen und unterbringen zu kŲnnen, musste zusštzlich noch eine Verkleinerung des Tanks in Kauf genommen werden.
# Auch wenn die anfšnglichen Visionen der beteiligten Konstrukteure nicht in vollem MaŖe umgesetzt werden konnten, so ist mit der Medusa 2 letztendlich doch ein wertvolles Waffensystem entstanden, welches die LŁcke zwischen semimobilen Fla-Rak-Werfern und schnellen Fla-Panzern sinnvoll auszufŁllen vermag. Es eignet sich fŁr schnelle VorstŲŖe ebenso, wie fŁr reine Defensivaufgaben.]
