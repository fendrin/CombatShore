#    infotext="Der Guppi Transporthubschrauber ist ein Drehflügelflugzeug, denn seine Tragflächen sind in Form eines horizontalen Rotors aufgebaut. Der Vorteil eines Hubschraubers aber liegt in der Fähigkeit, in der Luft stehen zu bleiben (Schwebeflug, auch Hover genannt), rückwärts oder seitwärts zu fliegen, sowie sich im langsamen Flug um die Hochachse (Gierachse) zu drehen. Weiterhin kann er senkrecht starten und landen und benötigt daher keine Start- oder Landebahn. Neben einem Hubschrauberlandeplatz reicht dazu bereits ein ebener Platz von ausreichendem Durchmesser. Der Betrieb eines modernen Hubschraubers ist im Vergleich zu einem Flächenflugzeug mit vergleichbarer Zuladung deutlich teurer. Dennoch ergeben sich aufgrund seiner Fähigkeit, auf unvorbereitetem Gelände starten und landen zu können, eine Reihe von zusätzlichen Einsatzgebieten. Einsätze im Hochgebirge, wie Lastentransport und Bergrettung, können wiederum durch die geringere Luftdichte und Abwinde den Antrieb an die Leistungsgrenze bringen. Verglichen mit Tragflächenflugzeugen weisen Hubschrauber eine deutlich höhere Unfallhäufigkeit auf."
# Aufgrund seiner soliden Bauweise, seiner ausgefeilten Technik, seiner geringen einfachen Bedienung gehört der "alte" Guppi zu den sichersten und beliebtesten Transporthubschraubern in der Armee. Er hat in den letzten Jahren unter den Piloten einen Kultstatus erreicht. 
# Die Technik kann als alt beschrieben werden und hat sich in den letzten Jahrzehnten kaum geändert, diese gilt unter Fachleuten als solide und absolut ausgereift.
# Ein direkter Kampfeinsatz, Einsätzen hinter der Front oder ein Fliegen in Zonen mit direkten feindlichen Beschuss sind durch die Armeeleitung ohne entsprechenden Begleitschutz und ohne ausdrückliche Genehmigung streng verboten ! 
# "
