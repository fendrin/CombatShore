#    Infotext = [Wie das vielköpfige Meeresungeheuer aus der griechischen Mythologie ist auch diese Corvette überaus giftig und beißt sozusagen nach allen Seiten. Seine vielseitige Bewaffnung und seine Schnelligkeit machten diesen Basistyp sehr beliebt. Dank modernster Sonartechnik kann man sich damit auch auf U-Boot-Jagd begeben. Es wurden zur Luftabwehr bewusst billigere Kanonen statt der teueren großen Raketten eingebaut. Dadurch können aber die feindlichen Flugobjekte in sehr hohen Luftschichten nicht bekämpft werden. Dieser Sachverhalt muss bei der Einsatzplanung stets berücksichtigt werden. Auch ist sein Wirkungsbereich in Küstennähe zum Einsatz gegen Bodentruppen zu klein. Durch seine sehr gute Torpedo Bewaffnung, daher auch der Name "Torpedokorvette" ist allgemein die Schiffbekämpfung sehr effektiv, besonders wenn diese im Rudel durchgeführt wird.  ]
