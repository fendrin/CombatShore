#textdomain wesnoth
[test]

    {CONTEXT_MENUES}

    name="Test scenario"
    map_data="{combat_shore_test.map}"

    turns=-1
    id=test

    {DAWN}
    {MORNING}
    {AFTERNOON}
    {DUSK}
    {FIRST_WATCH}
    {SECOND_WATCH}
    #victory_music="loyalists.ogg,underground.ogg,revelation.ogg"
    #defeat_music="sad.ogg"
    victory_when_enemies_defeated=no

    [side]
        [leader]
            #Rune
            type=1219
  #          variation=ground_level
            x,y=12,6
        [/leader]
        [unit]
            #Duke
            type=1291
  #          variation=submerged
            x=25
            y=16
        [/unit]

        [unit]
            #Snake
            type=1208
  #          variation=ground_level
            x,y=8,5
            [cargo_bay]
                [unit]
                    type=1215
                [/unit]
              #  [unit]
              #      type=
              #  [/unit]
            [/cargo_bay]
        [/unit]
        [unit]
            #Troll
            type=1215
  #          variation=ground_level
            x,y=8,7
        [/unit]


        [unit]
            #Pirate
            type=1287
            variation=ground_level
            x=26
            y=9
            facing=n
        [/unit]
        [unit]
            #Pirate
            type=1287
            variation=low_level_flight
            x=27
            y=9
            facing=n
        [/unit]
        [unit]
            #Pirate
            type=1287
            variation=medium_level_flight
            x=28
            y=8
            facing=n
        [/unit]
        [unit]
            #Pirate
            type=1287
            variation=high_level_flight
            x=29
            y=8
            facing=n
        [/unit]


        [unit]
            #Skull
            x,y=10,5
            type=1221
   #         variation=ground_level
        [/unit]
        no_leader=yes
        side=1
        controller=human
        gold=20000
        team_name="1"
        shroud=no
        fog=yes
    [/side]

    [side]
        no_leader=yes
        [unit]
            #Teckno
            type=1207
   #         variation=ground_level
            x=9
            y=4
        [/unit]

        side=2
        controller=human
        gold=20000
    [/side]

    [side]
        no_leader=yes
        [unit]
            #Teckno
            type=1207
   #         variation=ground_level
            x=22
            y=12
        [/unit]

        [unit]
            #Excalibur
            type=1226
   #         variation=ground_level
            x,y=10,11
        [/unit]

        side=3
        controller=human
        gold=20000
    [/side]


    [label]
        x,y=10,3
        text= _ "Speak"
    [/label]
    [event]
        name=enter_hex
        first_time_only=no
        [filter]
            x,y=10,3
        [/filter]
        [message]
            x,y=10,3
            message="Filtered by location only"
        [/message]
        [message]
            speaker=unit
            message="Filtered by speaker=unit"
        [/message]
        [message]
            x,y=10,3
            type=1215
            message="Filtered by type 1215 == troll"
        [/message]
        [message]
            x,y=10,3
            type=1208
            message="Filtered by type 1208 == snake"
        [/message]
    [/event]

    [label]
        x,y=12,5
        text= _ "Kill"
    [/label]
    [event]
        name=enter_hex
        first_time_only=no
        [filter]
            x,y=12,5
        [/filter]
        [kill]
            fire_event=yes
            animate=yes
            x,y=12,5
        [/kill]
    [/event]

    [event]
        name=last breath
        first_time_only=no
        [message]
            speaker=unit
            message="I am killed"
        [/message]
    [/event]

[/test]


