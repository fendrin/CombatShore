#textdomain wesnoth
[test]
    name="Test scenario"
    map_data="{combat_shore_test.map}"

    turns=-1
    id=test

    {DAWN}
    {MORNING}
    {AFTERNOON}
    {DUSK}
    {FIRST_WATCH}
    {SECOND_WATCH}
    #victory_music="loyalists.ogg,underground.ogg,revelation.ogg"
    #defeat_music="sad.ogg"
    victory_when_enemies_defeated=no

    [side]
        [leader]
            type=1219
            x,y=12,6
        [/leader]
        no_leader=yes
        side=1
        controller=human
        gold=2000
        village_support=5
        team_name="1"
        shroud=yes
        recall_cost=42
        [village]
            x,y=9,7
        [/village]
        [village]
            x,y=7,7
        [/village]
    [/side]

    [side]
        no_leader=yes
        side=2
        controller=human
        gold=2000
    [/side]


[/test]


